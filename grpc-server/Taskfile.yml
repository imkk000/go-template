version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Resolve and tidy Go module dependencies
    cmds:
      - go mod tidy

  run:
    desc: Run the gRPC server
    cmds:
      - go run .

  build:
    desc: Build static binary into ./bin/server
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ./bin/server .

  docker:
    desc: Build OCI image (multi-stage, distroless, non-root)
    vars:
      IMAGE: '{{.IMAGE | default "grpc-server:dev"}}'
    cmds:
      - docker build --pull -t {{.IMAGE}} .

  test:
    desc: Run unit tests
    cmds:
      - go test -race -count=1 ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ tmp/
