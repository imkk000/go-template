version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Resolve and tidy Go module / tool dependencies
    cmds:
      - go mod tidy

  run:
    desc: Run the gateway
    cmds:
      - go run .

  build:
    desc: Build static binary into ./bin/gateway
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ./bin/gateway .

  docker:
    desc: Build OCI image (multi-stage, distroless, non-root)
    vars:
      IMAGE: '{{.IMAGE | default "gateway:dev"}}'
    cmds:
      - docker build --pull -t {{.IMAGE}} .

  test:
    desc: Run tests
    cmds:
      - go test ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin ./tmp
