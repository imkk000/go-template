version: v2
clean: true
plugins:
  - local: ["go", "tool", "protoc-gen-go"]
    out: gen/go
    opt:
      - paths=source_relative
  - local: ["go", "tool", "protoc-gen-go-grpc"]
    out: gen/go
    opt:
      - paths=source_relative
  - local: ["go", "tool", "protoc-gen-openapiv2"]
    out: gen/openapiv2
    opt:
      - allow_merge=true
      - merge_file_name=api
      - json_names_for_fields=true
inputs:
  - directory: proto
